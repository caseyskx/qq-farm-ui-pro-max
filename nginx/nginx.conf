user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # NGINX rate-limiting / Gateway logic (Placeholder for real environments)
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream backend_nodes {
        # Pointing to the internal master cluster (in docker-compose it's farm-master:3000)
        # Using ip_hash or standard round-robin at the network layer shouldn't conflict with master dispatching logic.
        server farm-master:3000;
    }

    server {
        listen       80;
        server_name  localhost;

        # WebSocket & API Backend Proxy
        location / {
            proxy_pass http://backend_nodes;
            
            # Key WebSocket configurations
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Pass original client identifying info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Extended timeouts for long polling/websockets
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Handle errors
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
